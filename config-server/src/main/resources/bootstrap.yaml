server:
  port: 8888

spring:
  profiles:
    active: native,local
  application:
    name: config-server
  cloud:
    config:
      enabled: false  # Do not try to be a client of itself
      server:
        git:
          enabled: false
        native:
          search-locations: classpath:/config

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/
