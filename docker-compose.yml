version: '3.8'

services:
  # =========================
  # 🐘 POSTGRES
  # =========================
  postgres:
    image: postgres:14
    container_name: postgres
    environment:
      POSTGRES_DB: orderdb
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    restart: always
    networks:
      - backend

  # =========================
  # 🍃 MONGODB
  # =========================
  mongodb:
    image: mongo:latest
    container_name: mongodb
    ports:
      - "27017:27017"
    networks:
      - backend

  # =========================
  # ⚡ REDIS
  # =========================
  redis:
    image: redis:7
    container_name: redis
    ports:
      - "6379:6379"
    restart: always
    networks:
      - backend

  # =========================
  # 🧠 ZOOKEEPER & KAFKA
  # =========================
  zookeeper:
    image: confluentinc/cp-zookeeper:7.5.0
    container_name: zookeeper
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
    ports:
      - "2181:2181"
    restart: always
    networks:
      - backend

  kafka:
    image: confluentinc/cp-kafka:7.5.0
    container_name: kafka
    depends_on:
      - zookeeper
    ports:
      - "9092:9092"
    restart: always
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:29092,PLAINTEXT_HOST://0.0.0.0:9092
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:29092,PLAINTEXT_HOST://localhost:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
    networks:
      - backend

  # =========================
  # 📊 KAFKA UI
  # =========================
  kafka-ui:
    image: provectuslabs/kafka-ui
    container_name: kafka-ui
    ports:
      - "8085:8080"
    depends_on:
      - kafka
    environment:
      KAFKA_CLUSTERS_0_NAME: local
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: kafka:29092
    networks:
      - backend

  # =========================
  # 📊 PROMETHEUS
  # =========================
  prometheus:
    image: prom/prometheus
    container_name: prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml
    networks:
      - backend

  # =========================
  # 📈 GRAFANA
  # =========================
  grafana:
    image: grafana/grafana
    container_name: grafana
    ports:
      - "3000:3000"
    networks:
      - backend

  # =========================
  # 🔍 JAEGER
  # =========================
  jaeger:
    image: jaegertracing/all-in-one:latest
    ports:
      - "16686:16686"
      - "4317:4317"
      - "4318:4318"
    environment:
      - COLLECTOR_OTLP_ENABLED=true
    networks:
      - backend

  # =========================
  # 🛰️ DISCOVERY SERVER
  # =========================
  discovery-server:
    build: ./discovery-server
    container_name: discovery-server
    ports:
      - "8761:8761"
    networks:
      - backend

  # =========================
  # ⚙️ CONFIG SERVER
  # =========================
  config-server:
    build: ./config-server
    container_name: config-server
    ports:
      - "8888:8888"
    depends_on:
      - discovery-server
    networks:
      - backend

  # =========================
  # 🚪 API GATEWAY
  # =========================
  api-gateway:
    build: ./api-gateway
    container_name: api-gateway
    ports:
      - "9000:9000"
    depends_on:
      - discovery-server
      - config-server
    networks:
      - backend

  # =========================
  # 📦 SERVICES
  # =========================
  order-service:
    build: ./order-service
    container_name: order-service
    depends_on:
      - discovery-server
      - config-server
      - postgres
      - kafka
      - redis
    networks:
      - backend

  inventory-service:
    build: ./inventory-service
    container_name: inventory-service
    depends_on:
      - discovery-server
      - config-server
      - mongodb
    networks:
      - backend

  payment-service:
    build: ./payment-service
    container_name: payment-service
    depends_on:
      - discovery-server
      - config-server
      - kafka
    networks:
      - backend

networks:
  backend:
    driver: bridge
